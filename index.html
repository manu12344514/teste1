<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f4f4;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,.15);
        }

        h1 {
            color: #2c3e50;
            font-size: 48px;
            margin-bottom: 15px;
        }

        p {
            color: #555;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>👋 Bem-vindo!</h1>
        <p>Seja muito bem-vindo ao nosso site.</p>
    </div>

</body>
</html>
